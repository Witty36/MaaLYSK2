[remote.github]
owner = "Witty36"
repo = "MaaLYSK"

[changelog]
header = """
# 更新日志
## Commit
"""

body = """
{%- macro remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{% macro print_commit(commit) -%}
    - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
        {% if commit.breaking %}[**breaking**] {% endif %}\
        {{ commit.message | split(pat="\n") | first | upper_first }} \
        @{{ commit.author.name }}
        {%- if commit.footers -%}
            {%- for footer in commit.footers -%}
                {%- if footer.token == "Co-authored-by" -%}
                    {%- set co_author_name = footer.value | split(pat=" <") | first | trim %} @{{ co_author_name }}
                {%- endif -%}
            {%- endfor -%}
        {%- endif %}
{% endmacro -%}

{% if version %}\
    ## {{ version | trim_start_matches(pat="v") }} ({{ timestamp | date(format="%Y-%m-%d") }})
{% else %}\
    ## 未发布
{% endif %}\

{# 遍历 commits，按原分组输出，但改变格式 #}
{% for group, commits in commits | group_by(attribute="group") %}
    {# 获取干净的 group 名称（去掉注释和空格） #}
    {% set clean_group = group | replace(pat="<!-- \\d -->", with="") | trim %}
    
    {# 如果是文档类型，单独处理，跳过这里 #}
    {% if clean_group == "📚 文档" %}
        {# 暂存，后面单独输出 #}
        {% set doc_commits = commits %}
    {% else %}
        {# 将 emoji 分组名映射为英文前缀 #}
        {% if clean_group == "✨ 新功能" %}
            {% set prefix = "Feat" %}
        {% elif clean_group == "🐛 Bug修复" %}
            {% set prefix = "Fix" %}
        {% elif clean_group == "🚀 性能优化" %}
            {% set prefix = "Perf" %}
        {% elif clean_group == "🚜 代码重构" %}
            {% set prefix = "Refactor" %}
        {% elif clean_group == "🎨 样式" %}
            {% set prefix = "Style" %}
        {% elif clean_group == "🧪 测试" %}
            {% set prefix = "Test" %}
        {% elif clean_group == "📦 依赖更新" %}
            {% set prefix = "Chore" %}
        {% elif clean_group == "🔧 日常维护" %}
            {% set prefix = "Chore" %}
        {% elif clean_group == "⚙️ 持续集成" %}
            {% set prefix = "Ci" %}
        {% elif clean_group == "🔒 安全" %}
            {% set prefix = "Security" %}
        {% elif clean_group == "◀️ 撤销" %}
            {% set prefix = "Revert" %}
        {% else %}
            {% set prefix = clean_group %}
        {% endif %}
        
        {# 输出该分组下的所有 commits #}
        {% for commit in commits %}
            {% set msg = commit.message | split(pat="[：:]", re=true) | last | trim %}
            - {{ prefix }}：{{ msg }} @{{ commit.author.username | default(value=commit.author.name) }}
        {% endfor %}
    {% endif %}
{% endfor -%}

{# 单独输出文档类型 #}
{% if doc_commits is defined and doc_commits | length > 0 %}

### Doc
{% for commit in doc_commits %}
    {% set msg = commit.message | split(pat="[：:]", re=true) | last | trim %}
    - {{ msg }} @{{ commit.author.username | default(value=commit.author.name) }}
{% endfor %}
{% endif -%}

{# 修复：只在 github 存在且有 contributors 时才输出 #}
{%- if github is defined and github and github.contributors is defined and github.contributors | filter(attribute="is_first_time", value=true) | length != 0 %}
  ## 新贡献者 ❤️
{% for contributor in github.contributors | filter(attribute="is_first_time", value=true) %}
  * @{{ contributor.username }} made their first contribution
    {%- if contributor.pr_number %} in \
      [#{{ contributor.pr_number }}]({{ self::remote_url() }}/pull/{{ contributor.pr_number }}) \
    {%- endif %}
{%- endfor -%}
{%- endif -%}
"""

footer = """
"""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = false
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->✨ 新功能" },
    { message = "^fix", group = "<!-- 1 -->🐛 Bug修复" },
    { message = "^docs", group = "<!-- 4 -->📚 文档" },
    { message = "^perf", group = "<!-- 3 -->🚀 性能优化" },
    { message = "^refactor", group = "<!-- 2 -->🚜 代码重构" },
    { message = "^style", group = "<!-- 5 -->🎨 样式" },
    { message = "^test", group = "<!-- 6 -->🧪 测试" },
    { message = "^chore\\(deps\\)", group = "📦 依赖更新" },
    { message = "^chore", group = "<!-- 8 -->🔧 日常维护" },
    { message = "^ci", group = "<!-- 7 -->⚙️ 持续集成" },
    { body = ".*security", group = "<!-- 9 -->🔒 安全" },
    { message = "^revert", group = "<!-- 10 -->◀️ 撤销" },
]

ignore_tags = "rc"
sort_commits = "oldest"

[git.github]
commits = true