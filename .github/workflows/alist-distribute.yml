name: Alist Distribution

on:
  # 手动触发：支持输入 tag
  workflow_dispatch:
    inputs:
      tag:
        description: "The release tag to distribute"
        required: false
        default: ""
        type: string
  # 自动触发：有新 release 发布时
  release:
    types: [published]

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      distribute_tag: ${{ steps.resolve-tag.outputs.tag }}
      source: ${{ steps.resolve-tag.outputs.source }}
      need_approval: ${{ steps.resolve-tag.outputs.need_approval }}
    steps:
      - name: Resolve tag to distribute
        id: resolve-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 优先使用手动输入的 tag
          MANUAL_TAG="${{ github.event.inputs.tag }}"
          RELEASE_TAG="${{ github.event.release.tag_name }}"

          if [ -n "$MANUAL_TAG" ]; then
            # 手动触发模式 - 不需要批准
            TAG="$MANUAL_TAG"
            SOURCE="manual"
            NEED_APPROVAL="false"
            echo "✅ 使用手动输入的版本: $TAG"
          elif [ -n "$RELEASE_TAG" ]; then
            # Release 触发模式 - 需要批准
            TAG="$RELEASE_TAG"
            SOURCE="release"
            NEED_APPROVAL="true"
            echo "✅ 使用新发布的版本: $TAG"
          else
            # 手动触发但未输入 tag，自动获取最新版 - 不需要批准
            LATEST_TAG=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases?per_page=1" | \
              jq -r '.[0].tag_name')
            TAG="$LATEST_TAG"
            SOURCE="auto-latest"
            NEED_APPROVAL="false"
            echo "✅ 未输入版本，自动获取最新版: $TAG"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "source=$SOURCE" >> $GITHUB_OUTPUT
          echo "need_approval=$NEED_APPROVAL" >> $GITHUB_OUTPUT

  # 只有 release 触发时才需要确认
  confirm:
    runs-on: ubuntu-latest
    needs: get-version
    if: needs.get-version.outputs.need_approval == 'true'
    environment:
      name: alist-release-confirmation
    steps:
      - name: Display release info
        run: |
          echo "## 🚀 新 Release 发布，需要确认" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 信息 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 分发版本 | ${{ needs.get-version.outputs.distribute_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release 名称 | ${{ github.event.release.name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 发布者 | ${{ github.event.release.author.login }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**说明:** 请确认是否将上述版本分发到 Alist 云盘"

  distribute:
    runs-on: ubuntu-latest
    needs: [get-version, confirm]
    # 只有需要批准时，distribute 才需要等待 confirm 完成
    # 不需要批准时，直接执行
    if: always() && (needs.get-version.outputs.need_approval == 'false' || needs.confirm.result == 'success')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show distribution info
        run: |
          if [ "${{ needs.get-version.outputs.need_approval }}" = "true" ]; then
            echo "✅ 已确认，开始分发到 Alist 云盘"
          else
            echo "🚀 手动触发，直接开始分发到 Alist 云盘"
          fi
          echo "📦 版本: ${{ needs.get-version.outputs.distribute_tag }}"
          echo "🔔 触发源: ${{ needs.get-version.outputs.source }}"

      - name: Distribute to Cloud Drives via Alist
        env:
          ALIST_URL: ${{ secrets.ALIST_URL }}
          ALIST_USERNAME: ${{ secrets.ALIST_USERNAME }}
          ALIST_PASSWORD: ${{ secrets.ALIST_PASSWORD }}
          DISTRIBUTE_TAG: ${{ needs.get-version.outputs.distribute_tag }}
        run: |
          echo "Installing dependencies..."
          pip install requests
          echo "Running Alist internal distribution script for tag: $DISTRIBUTE_TAG"
          python tools/ci/sync_with_alist.py
